# CI (Continuous Integration — Integración Continua)
# Este workflow corre automáticamente en cada push y PR a main
# Verifica que el código no rompe nada antes de mergear

name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  api:
    name: Backend (Node.js)
    runs-on: ubuntu-latest

    steps:
      - name: Checkout código
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: apps/api/package-lock.json

      - name: Instalar dependencias
        working-directory: apps/api
        run: npm ci

      - name: Lint (análisis de estilo de código)
        working-directory: apps/api
        run: npm run lint

      - name: Build (compilar TypeScript a JavaScript)
        working-directory: apps/api
        run: npm run build

      - name: Tests
        working-directory: apps/api
        run: npm test
        continue-on-error: true  # No bloquear en Sprint 1 cuando no hay tests

  web:
    name: Frontend (Flutter Web)
    runs-on: ubuntu-latest

    steps:
      - name: Checkout código
        uses: actions/checkout@v4

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: 'stable'

      - name: Instalar dependencias
        working-directory: apps/web
        run: flutter pub get

      - name: Análisis de código
        working-directory: apps/web
        run: flutter analyze

      - name: Build web
        working-directory: apps/web
        run: flutter build web --release
