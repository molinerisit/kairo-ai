<!DOCTYPE html>
<html>
<head>
  <base href="$FLUTTER_BASE_HREF">

  <meta charset="UTF-8">
  <meta content="IE=Edge" http-equiv="X-UA-Compatible">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="AXIIA — Automatizá tu negocio con inteligencia artificial. Gestioná conversaciones, citas y clientes desde un solo lugar.">

  <!-- iOS meta tags & icons -->
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black">
  <meta name="apple-mobile-web-app-title" content="AXIIA">
  <link rel="apple-touch-icon" href="icons/Icon-192.png">

  <!-- Favicon -->
  <link rel="icon" type="image/png" href="favicon.png"/>

  <title>AXIIA</title>
  <link rel="manifest" href="manifest.json">

  <style>
    /* Splash screen — visible hasta que Flutter renderiza el primer frame */
    html, body {
      margin: 0;
      padding: 0;
      background-color: #0A0A0F;
      height: 100%;
    }

    #flutter-loading {
      position: fixed;
      inset: 0;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      background-color: #0A0A0F;
      z-index: 9999;
      transition: opacity 0.3s ease;
    }

    #flutter-loading.hidden {
      opacity: 0;
      pointer-events: none;
    }

    .axiia-logo {
      display: flex;
      align-items: center;
      gap: 10px;
      margin-bottom: 32px;
    }

    .axiia-icon {
      width: 36px;
      height: 36px;
      background: linear-gradient(135deg, #6C63FF, #4ECDC4);
      border-radius: 9px;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .axiia-icon svg {
      width: 20px;
      height: 20px;
      fill: white;
    }

    .axiia-wordmark {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      font-size: 22px;
      font-weight: 700;
      letter-spacing: 2px;
      color: #F0F0F5;
    }

    /* Spinner */
    .spinner {
      width: 28px;
      height: 28px;
      border: 2.5px solid rgba(108, 99, 255, 0.2);
      border-top-color: #6C63FF;
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
    }

    @keyframes spin {
      to { transform: rotate(360deg); }
    }
  </style>
</head>
<body>
  <!-- Splash inmediato — se oculta cuando Flutter termina de inicializar -->
  <div id="flutter-loading">
    <div class="axiia-logo">
      <div class="axiia-icon">
        <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
          <path d="M12 2L2 7l10 5 10-5-10-5zM2 17l10 5 10-5M2 12l10 5 10-5"/>
        </svg>
      </div>
      <span class="axiia-wordmark">AXIIA</span>
    </div>
    <div class="spinner"></div>
  </div>

  <!-- Flutter bootstrap — se encarga de cargar el engine automáticamente -->
  <script src="flutter_bootstrap.js" async></script>

  <script>
    // Flutter dispara 'flutter-first-frame' cuando pinta su primer frame real.
    // Es el momento seguro para ocultar el splash sin flickering.
    window.addEventListener('flutter-first-frame', function() {
      var loading = document.getElementById('flutter-loading');
      loading.classList.add('hidden');
      setTimeout(function() { loading.style.display = 'none'; }, 300);
    });
  </script>
</body>
</html>
