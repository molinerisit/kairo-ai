<!DOCTYPE html>
<html>
<head>
  <base href="$FLUTTER_BASE_HREF">

  <meta charset="UTF-8">
  <meta content="IE=Edge" http-equiv="X-UA-Compatible">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="AXIIA — Automatizá tu negocio con inteligencia artificial. Gestioná conversaciones, citas y clientes desde un solo lugar.">

  <!-- iOS meta tags & icons -->
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black">
  <meta name="apple-mobile-web-app-title" content="AXIIA">
  <link rel="apple-touch-icon" href="icons/Icon-192.png">

  <!-- Favicon -->
  <link rel="icon" type="image/png" href="favicon.png"/>

  <title>AXIIA</title>
  <link rel="manifest" href="manifest.json">

  <style>
    /* Splash screen — visible hasta que Flutter renderiza el primer frame */
    html, body {
      margin: 0;
      padding: 0;
      background-color: #0A0A0F;
      height: 100%;
    }

    #flutter-loading {
      position: fixed;
      inset: 0;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      background-color: #0A0A0F;
      z-index: 9999;
      transition: opacity 0.3s ease;
    }

    #flutter-loading.hidden {
      opacity: 0;
      pointer-events: none;
    }

    .axiia-logo {
      display: flex;
      align-items: center;
      gap: 10px;
      margin-bottom: 32px;
    }

    .axiia-icon {
      width: 36px;
      height: 36px;
      background: linear-gradient(135deg, #6C63FF, #4ECDC4);
      border-radius: 9px;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .axiia-icon svg {
      width: 20px;
      height: 20px;
      fill: white;
    }

    .axiia-wordmark {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      font-size: 22px;
      font-weight: 700;
      letter-spacing: 2px;
      color: #F0F0F5;
    }

    /* Spinner */
    .spinner {
      width: 28px;
      height: 28px;
      border: 2.5px solid rgba(108, 99, 255, 0.2);
      border-top-color: #6C63FF;
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
    }

    @keyframes spin {
      to { transform: rotate(360deg); }
    }
  </style>
</head>
<body>
  <!-- Splash inmediato — se oculta cuando Flutter termina de inicializar -->
  <div id="flutter-loading">
    <div class="axiia-logo">
      <div class="axiia-icon">
        <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
          <path d="M12 2L2 7l10 5 10-5-10-5zM2 17l10 5 10-5M2 12l10 5 10-5"/>
        </svg>
      </div>
      <span class="axiia-wordmark">AXIIA</span>
    </div>
    <div class="spinner"></div>
  </div>

  <!-- Facebook SDK para Embedded Signup de WhatsApp -->
  <div id="fb-root"></div>
  <script>
    window.fbAsyncInit = function() {
      FB.init({
        appId:   '2750786518653266',
        version: 'v21.0',
        xfbml:   false,
        cookie:  true,
      });
    };

    // Carga el SDK de forma asíncrona
    (function(d, s, id) {
      if (d.getElementById(id)) return;
      var js = d.createElement(s); js.id = id;
      js.src = 'https://connect.facebook.net/en_US/sdk.js';
      d.head.appendChild(js);
    }(document, 'script', 'facebook-jssdk'));

    // kairoLoginMeta: abre el popup de Facebook Login con permisos de WhatsApp Business.
    // Devuelve una Promise con { access_token } para que Flutter pueda fetchear
    // los WABAs y números del usuario y mostrarle un picker.
    window.kairoLoginMeta = function() {
      return new Promise(function(resolve, reject) {
        FB.login(function(response) {
          console.log('[AXIIA] FB.login response:', JSON.stringify(response));
          if (response.authResponse && response.authResponse.code) {
            console.log('[AXIIA] code recibido:', response.authResponse.code.substring(0, 20) + '...');
            resolve({ code: response.authResponse.code });
          } else {
            console.warn('[AXIIA] Sin code. status:', response.status, 'authResponse:', response.authResponse);
            reject(new Error(
              response.status === 'unknown'
                ? 'Cancelaste la conexión con Meta'
                : 'No se pudo obtener autorización de Meta'
            ));
          }
        }, {
          config_id:     '3151393411723442',
          response_type: 'code',
          override_default_response_type: true,
        });
      });
    };
  </script>

  <!-- Flutter bootstrap — se encarga de cargar el engine automáticamente -->
  <script src="flutter_bootstrap.js" async></script>

  <script>
    // Flutter dispara 'flutter-first-frame' cuando pinta su primer frame real.
    // Es el momento seguro para ocultar el splash sin flickering.
    window.addEventListener('flutter-first-frame', function() {
      var loading = document.getElementById('flutter-loading');
      loading.classList.add('hidden');
      setTimeout(function() { loading.style.display = 'none'; }, 300);
    });
  </script>
</body>
</html>
